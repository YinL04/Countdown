<!DOCTYPE html>
<html lang="zh-CN" data-theme="modern">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Countdown App</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="wood-texture-bg hidden"></div>
    <div class="office-bg hidden"></div>

    <div class="app-container" id="app-container">
        <header class="top-nav glass-panel theme-header">
            <div class="nav-brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="brand-svg">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <h1>我的倒计时</h1>
            </div>
            <div class="nav-actions">
                <select id="theme-selector" class="theme-select input-element">
                    <option value="modern">🌌 现代科幻</option>
                    <option value="office">🏢 商务办公</option>
                    <option value="ios6">📱 拟物复古</option>
                </select>
                <button id="open-calendar-btn" class="secondary-btn sm-btn nav-btn">📅 日历</button>
                <button id="add-new-btn" class="primary-btn sm-btn nav-btn">+ 添加事件</button>
            </div>
        </header>

        <main class="dashboard">
            <div id="cards-container" class="cards-grid">
                <!-- Countdowns will be injected here -->
            </div>
            <div id="empty-state" class="empty-state hidden">
                <p>目前没有倒数计时，快新建一个吧！</p>
            </div>
        </main>
    </div>

    <!-- Calendar Overlay -->
    <div class="modal-overlay hidden" id="calendar-overlay">
        <div class="glass-container modal-box calendar-box">
            <div class="modal-header">
                <h2>事件日历</h2>
                <div class="cal-controls">
                    <button id="cal-prev" class="cal-nav-btn">◀</button>
                    <span id="cal-month-year" class="cal-title">2026年 4月</span>
                    <button id="cal-next" class="cal-nav-btn">▶</button>
                </div>
                <button id="close-calendar" class="close-btn">&times;</button>
            </div>
            <div class="calendar-wrapper">
                <div class="cal-weekdays">
                    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="cal-days" id="cal-days-grid">
                    <!-- Days generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Event Setup Modal Overlay -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="glass-container modal-box event-modal">
            <div class="modal-header">
                <h2 id="modal-title">添加新的倒计时</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="setup-section">
                <input type="hidden" id="editing-event-id" value="">
                <div class="input-group">
                    <label for="event-name">事件名称</label>
                    <input type="text" id="event-name" class="input-element" placeholder="例如：新年、项目上线..."
                        autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="event-time">目标时间 (精确到秒)</label>
                    <input type="datetime-local" id="event-time" class="input-element" step="1">
                </div>
                <button id="save-btn" class="primary-btn submit-btn">保存记录</button>
            </div>
        </div>
    </div>

    <!-- Template for Countdown Card -->
    <template id="card-template">
        <div class="countdown-card glass-panel">
            <div class="card-header">
                <h3 class="card-title"></h3>
                <div class="card-actions">
                    <button class="edit-btn action-btn text-btn" title="编辑记录">
                        ✏️
                    </button>
                    <button class="delete-btn action-btn text-btn" title="删除记录">
                        ❌
                    </button>
                </div>
            </div>

            <div class="time-blocks">
                <div class="time-block">
                    <span class="time-value days">00</span>
                    <span class="time-label">天</span>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span class="time-value hours">00</span>
                    <span class="time-label">时</span>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span class="time-value minutes">00</span>
                    <span class="time-label">分</span>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span class="time-value seconds">00</span>
                    <span class="time-label">秒</span>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>

</html>
