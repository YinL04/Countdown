<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Countdown Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="app-container" id="app-container">
        <header class="top-nav glass-panel">
            <div class="nav-brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#fff" />
                            <stop offset="100%" stop-color="#a5b4fc" />
                        </linearGradient>
                    </defs>
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <h1>我的倒计时</h1>
            </div>
            <button id="add-new-btn" class="primary-btn sm-btn">+ 新增记录</button>
        </header>

        <main class="dashboard">
            <div id="cards-container" class="cards-grid">
                <!-- Countdowns will be injected here -->
            </div>
            <div id="empty-state" class="empty-state hidden">
                <p>目前没有记录，点击右上角添加一个吧！</p>
            </div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="glass-container modal-box">
            <div class="modal-header">
                <h2>添加新的倒计时</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="setup-section">
                <div class="input-group">
                    <label for="event-name">事件名称</label>
                    <input type="text" id="event-name" placeholder="例如：新年、项目上线..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="event-time">目标时间 (精确到秒)</label>
                    <input type="datetime-local" id="event-time" step="1">
                </div>
                <button id="save-btn" class="primary-btn">保存并开始</button>
            </div>
        </div>
    </div>

    <!-- Template for Countdown Card -->
    <template id="card-template">
        <div class="countdown-card glass-panel">
            <div class="card-header">
                <h3 class="card-title"></h3>
                <button class="delete-btn" title="删除记录">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>
            
            <div class="time-blocks">
                <div class="time-block">
                    <span class="time-value days">00</span>
                    <span class="time-label">天</span>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span class="time-value hours">00</span>
                    <span class="time-label">时</span>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span class="time-value minutes">00</span>
                    <span class="time-label">分</span>
                </div>
                <div class="separator">:</div>
                <div class="time-block">
                    <span class="time-value seconds">00</span>
                    <span class="time-label">秒</span>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
